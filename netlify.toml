# Netlify configuration — alternative to vercel.json
# Subdomain splash pages are routed by host. The main site is served at the apex.

[build]
  publish = "."

# Outer Banks subdomain -> /outer-banks/
[[redirects]]
  from = "https://outerbanks.brannanshore.com/"
  to = "/outer-banks/index.html"
  status = 200
  force = true

# Wildwood subdomain -> /wildwood/
[[redirects]]
  from = "https://wildwood.brannanshore.com/"
  to = "/wildwood/index.html"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
